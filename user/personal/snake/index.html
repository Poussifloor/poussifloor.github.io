<pre id="snake-grid" style="display:none; line-height:0.6; background:transparent; border:none; margin:0;"></pre>

<script src="/user/personal/snake/snake.js"></script>
<script>
(function () {
  const grid = document.getElementById('snake-grid');
  const getPromptRow = () => document.querySelector('.prompt-row');
  const getInput     = () => document.getElementById('answer');

  window.SNAKE_OUTPUT = (text) => { grid.textContent = text; };

  window.SNAKE_DONE = () => {
    grid.style.display = 'none';
    const promptRow = getPromptRow();
    const input     = getInput();
    if (promptRow) promptRow.style.display = '';
    if (input) input.focus();
  };

  window.PAGE_COMMANDS = window.PAGE_COMMANDS || {};

  window.PAGE_COMMANDS['snake'] = function (args, { print, printError }) {
    const [sub] = args;

      if (!sub || sub === 'help') {
        return print([
          '> snake:',
          '  snake help               show this message',
          '  snake run                launch the snake game',
          '  snake grid               change grid dimension',
          '  snake speed <%>          change speed indentation',
          '  snake fps_min <ms>       change minimum framerate',
        ]);
      }

      if (sub === 'run') {
        const promptRow = getPromptRow();
        if (promptRow) promptRow.style.display = 'none';
        grid.style.display = 'block';
        window.snakeStart();
        return;
      }

      if (sub === 'grid') {
        return window.TERM.prompt(
            [
              { key: 'height', validate: s => Number.isInteger(+s) && +s > 0 },
              { key: 'width',  validate: s => Number.isInteger(+s) && +s > 0 },
            ],
            (a, ctx) => { 
              window.SNAKE.H = +a.height;
              window.SNAKE.L = +a.width;
              snakeInit(); // restart with new dimensions
              ctx.print('> grid set to ' + L + 'x' + H);}
        );
      }

      if (sub === 'speed') {
        const val = +args[1];
        if (!args[1] || !Number.isInteger(val) || val <= 0) {
          return printError('usage: snake speed <integer>');
        }
        window.SNAKE.s = val;
        return print('> speed set to ' + val);
      }

      if (sub === 'fps_min') {
        const val = +args[1];
        if (!args[1] || !Number.isInteger(val) || val <= 0) {
          return printError('usage: snake fps_min <integer>');
        }
        print('> refresh set from '+window.SNAKE.fps_min+' ms to ' + val + 'ms');
        window.SNAKE.fps_min = val;
        return;
      }

      return printError('snake: unknown subcommand: ' + sub);
    };

  window.PAGE_COMMANDS['snake'].help = 'snake <args>               snake commands';
})();
</script>
