---
layout: page
---
<style>
  .cv-section {
    font-family: 'Georgia', serif;
    max-width: 860px;
    margin: 0 auto;
    padding: 1.5rem 0;
    color: #d4d0c8;
  }

  .cv-section + .cv-section {
    padding-top: 0;
  }

  .cv-section h2 {
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #ffe066;
    border-bottom: 1px solid rgba(255, 224, 102, 0.25);
    padding-bottom: 0.35rem;
    margin-bottom: 1.2rem;
  }

  .cv-table {
    width: 100%;
    border-collapse: collapse;
  }

  .cv-table tr {
    vertical-align: top;
  }

  .cv-table tr + tr td {
    padding-top: 1.2rem;
  }

  .cv-period {
    width: 9vw;
    min-width: 90px;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 0.92rem;
    color: rgba(255, 224, 102, 0.45);
    padding-right: 1.8rem;
    white-space: nowrap;
    padding-top: 0.15rem;
    letter-spacing: 0.05em;
  }

  .cv-label {
    width: 150px;
    min-width: 120px;
    font-size: 0.9rem;
    font-weight: 700;
    color: #d4d0c8;
    padding-right: 1.8rem;
    padding-top: 0.1rem;
  }

  .cv-content {
    font-size: 0.92rem;
    line-height: 1.7;
    color: #b0aca0;
  }

  .cv-content strong {
    font-weight: 700;
    font-size: 0.95rem;
    color: #d4d0c8;
  }

  .cv-content .role {
    display: block;
    margin-top: 0.1rem;
    font-style: italic;
    color: #888;
  }

  .cv-content .institution {
    display: block;
    margin-top: 0.1rem;
    color: #999;
  }

  .cv-content .courses {
    display: block;
    margin-top: 0.25rem;
    color: #777;
    font-size: 0.87rem;
  }

  .cv-content ul {
    margin: 0.4rem 0 0 0;
    padding-left: 1rem;
    color: #888;
    font-size: 0.88rem;
  }

  .cv-content ul li {
    margin-bottom: 0.2rem;
  }
</style>
